name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build service-a image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/service-a ./service-a

    - name: Build service-b image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/service-b ./service-b

    - name: Push service-a image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/service-a

    - name: Push service-b image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/service-b
