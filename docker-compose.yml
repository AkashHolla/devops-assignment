services:
  service-a:
    build: ./service-a
    ports:
      - "5000:5000"
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 2s
      retries: 5

  service-b:
    build: ./service-b
    restart: always
    depends_on:
      service-a:
        condition: service_healthy
    environment:
      - SERVICE_A_URL=http://service-a:5000
